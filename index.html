<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIO Insights</title>
<style>
  :root {
    --ground:#eef1f4; --surface:#ffffff; --surface-2:#f7f9fb;
    --ink:#161b22; --muted:#59636f; --faint:#8b95a1; --hair:#dbe1e8;
    --accent:#3b6ea5; --accent-ink:#ffffff;
    --tech-ai:#2a78d6; --tech-data:#1baf7a; --tech-robo:#4a3aa7; --tech-dews:#eb6834;
    --v-gap:#c1443f; --v-emerging:#3b6ea5; --v-proven:#1f8a5b;
    --f-verified:#1f8a5b; --f-paywall:#c98a00; --f-unverified:#c1443f;
    --shadow:0 1px 2px rgba(20,30,45,.06),0 3px 10px rgba(20,30,45,.05);
    --radius:10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground:#0c1014; --surface:#141a20; --surface-2:#1a222a;
      --ink:#e7ecf2; --muted:#93a0ad; --faint:#6b7885; --hair:#232c35;
      --accent:#6c9bd1; --accent-ink:#0c1014;
      --tech-ai:#3987e5; --tech-data:#28b98a; --tech-robo:#9085e9; --tech-dews:#e07a4a;
      --v-gap:#e06b66; --v-emerging:#6c9bd1; --v-proven:#3fb07e;
      --f-verified:#3fb07e; --f-paywall:#e0a82e; --f-unverified:#e06b66;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 3px 12px rgba(0,0,0,.28);
    }
  }
  :root[data-theme="light"] {
    --ground:#eef1f4; --surface:#ffffff; --surface-2:#f7f9fb;
    --ink:#161b22; --muted:#59636f; --faint:#8b95a1; --hair:#dbe1e8;
    --accent:#3b6ea5; --accent-ink:#ffffff;
    --tech-ai:#2a78d6; --tech-data:#1baf7a; --tech-robo:#4a3aa7; --tech-dews:#eb6834;
    --v-gap:#c1443f; --v-emerging:#3b6ea5; --v-proven:#1f8a5b;
    --f-verified:#1f8a5b; --f-paywall:#c98a00; --f-unverified:#c1443f;
    --shadow:0 1px 2px rgba(20,30,45,.06),0 3px 10px rgba(20,30,45,.05);
  }
  :root[data-theme="dark"] {
    --ground:#0c1014; --surface:#141a20; --surface-2:#1a222a;
    --ink:#e7ecf2; --muted:#93a0ad; --faint:#6b7885; --hair:#232c35;
    --accent:#6c9bd1; --accent-ink:#0c1014;
    --tech-ai:#3987e5; --tech-data:#28b98a; --tech-robo:#9085e9; --tech-dews:#e07a4a;
    --v-gap:#e06b66; --v-emerging:#6c9bd1; --v-proven:#3fb07e;
    --f-verified:#3fb07e; --f-paywall:#e0a82e; --f-unverified:#e06b66;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 3px 12px rgba(0,0,0,.28);
  }

  * { box-sizing:border-box; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--ground); color:var(--ink);
    font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-feature-settings:"cv05","ss01"; -webkit-font-smoothing:antialiased;
  }
  code, .mono, .id, .kbd { font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; }
  a { color:inherit; }
  .wrap { max-width:1080px; margin:0 auto; padding:0 20px 72px; }

  /* Masthead */
  header.mast {
    position:sticky; top:0; z-index:20;
    background:color-mix(in srgb, var(--ground) 88%, transparent);
    backdrop-filter:saturate(1.2) blur(8px);
    border-bottom:1px solid var(--hair);
  }
  .mast-in { max-width:1080px; margin:0 auto; padding:14px 20px;
    display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .brand { display:flex; align-items:baseline; gap:10px; }
  .brand .mark {
    font-family:ui-monospace,Menlo,monospace; font-weight:700; letter-spacing:.14em;
    font-size:13px; color:var(--accent-ink); background:var(--accent);
    padding:5px 9px; border-radius:6px;
  }
  .brand h1 { font-size:17px; margin:0; font-weight:650; letter-spacing:-.01em; }
  .brand .ed { color:var(--muted); font-size:13px; }
  .tabs { display:flex; gap:4px; }
  .tabs a { text-decoration:none; font-size:13px; padding:6px 12px; border-radius:8px; color:var(--muted);
    border:1px solid transparent; }
  .tabs a:hover { color:var(--ink); }
  .tabs a.active { color:var(--ink); background:var(--surface-2); border-color:var(--hair); font-weight:600; }
  .mast-spacer { flex:1 1 auto; }
  .themebtn {
    border:1px solid var(--hair); background:var(--surface); color:var(--muted);
    width:34px; height:34px; border-radius:8px; cursor:pointer; font-size:15px;
    display:grid; place-items:center;
  }
  .themebtn:hover { color:var(--ink); border-color:var(--faint); }

  /* Summary tiles */
  .tiles { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:24px 0 20px; }
  .tile {
    background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius);
    padding:14px 16px; box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .tile .n { font-size:26px; font-weight:680; letter-spacing:-.02em; font-variant-numeric:tabular-nums; }
  .tile .l { font-size:11.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-top:2px; }
  .tile::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--tint,var(--accent)); }
  .tile.gap { --tint:var(--v-gap); }
  .tile.dec { --tint:var(--accent); }
  .tile.prov { --tint:var(--v-proven); }
  .tile.feed { --tint:var(--tech-dews); }

  /* Controls */
  .controls {
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
    padding:14px 16px; background:var(--surface); border:1px solid var(--hair);
    border-radius:var(--radius); margin-bottom:8px; box-shadow:var(--shadow);
  }
  .fgroup { display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .fgroup > .glabel { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:var(--faint); margin-right:2px; }
  .toggle {
    border:1px solid var(--hair); background:var(--surface-2); color:var(--muted);
    padding:4px 10px; border-radius:999px; font-size:12.5px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; line-height:1.4;
  }
  .toggle:hover { border-color:var(--faint); color:var(--ink); }
  .toggle .dot { width:8px; height:8px; border-radius:50%; background:var(--c,var(--faint)); }
  .toggle[aria-pressed="true"] { color:var(--ink); border-color:var(--c,var(--accent));
    background:color-mix(in srgb, var(--c,var(--accent)) 14%, var(--surface)); font-weight:550; }
  .search {
    margin-left:auto; flex:1 1 180px; min-width:150px; max-width:280px;
    border:1px solid var(--hair); background:var(--surface-2); color:var(--ink);
    padding:7px 11px; border-radius:8px; font:inherit; font-size:13.5px;
  }
  .search::placeholder { color:var(--faint); }
  .search:focus, .toggle:focus-visible, .themebtn:focus-visible, a:focus-visible {
    outline:2px solid var(--accent); outline-offset:2px;
  }

  /* Section heads */
  .sec-h { display:flex; align-items:center; gap:12px; margin:30px 4px 12px; }
  .sec-h .rn { font-family:ui-monospace,Menlo,monospace; font-weight:700; color:var(--accent);
    font-size:13px; border:1.5px solid var(--accent); border-radius:6px; padding:2px 8px; }
  .sec-h h2 { font-size:15px; margin:0; font-weight:620; letter-spacing:-.005em; }
  .sec-h .rule { flex:1; height:1px; background:var(--hair); }
  .sec-h .ct { color:var(--faint); font-size:12.5px; font-variant-numeric:tabular-nums; }

  /* Serial card */
  .cards { display:flex; flex-direction:column; gap:12px; }
  .card {
    background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden; border-left:4px solid var(--vc,var(--hair));
  }
  .card.v-gap { --vc:var(--v-gap); } .card.v-emerging { --vc:var(--v-emerging); } .card.v-proven { --vc:var(--v-proven); }
  .card-top { display:flex; align-items:center; gap:9px; flex-wrap:wrap; padding:12px 16px 0; }
  .id { font-weight:700; font-size:13px; color:var(--ink); background:var(--surface-2);
    border:1px solid var(--hair); border-radius:6px; padding:2px 7px; letter-spacing:.02em; }
  .pf { font-size:12px; color:var(--muted); }
  .chip { font-size:11.5px; padding:2px 8px; border-radius:999px; display:inline-flex; align-items:center; gap:5px;
    border:1px solid transparent; line-height:1.5; white-space:nowrap; }
  .chip .dot { width:7px; height:7px; border-radius:50%; background:var(--c); }
  .chip.verdict { font-weight:600; text-transform:capitalize; color:var(--vc);
    background:color-mix(in srgb, var(--vc) 12%, var(--surface)); border-color:color-mix(in srgb,var(--vc) 30%,transparent); }
  .chip.prio-decision { background:var(--accent); color:var(--accent-ink); font-weight:600; letter-spacing:.03em; }
  .chip.prio-monitor { background:transparent; color:var(--muted); border-color:var(--hair); letter-spacing:.03em; }
  .chip.status { color:var(--faint); background:var(--surface-2); border-color:var(--hair); text-transform:capitalize; }
  .chip.tech { background:var(--surface-2); color:var(--muted); border-color:var(--hair); }
  .chip.tech.t-ai { --c:var(--tech-ai); } .chip.tech.t-data { --c:var(--tech-data); }
  .chip.tech.t-robo { --c:var(--tech-robo); } .chip.tech.t-dews { --c:var(--tech-dews); }
  .chip.desk { background:var(--surface-2); color:var(--muted); border-color:var(--hair); font-variant:small-caps; letter-spacing:.02em; }
  .chip.media { background:var(--surface-2); color:var(--muted); border-color:var(--hair); text-transform:capitalize; }
  .grow { flex:1; }

  .card-body { padding:11px 16px 15px; }
  .decision { font-size:16.5px; line-height:1.4; font-weight:560; letter-spacing:-.01em; margin:2px 0 2px; text-wrap:pretty; }
  .dlabel { font-size:11px; text-transform:uppercase; letter-spacing:.09em; color:var(--accent); font-weight:600; margin-bottom:5px; }
  .analysis { display:grid; grid-template-columns:1fr; gap:9px; margin:13px 0 4px; }
  .field { }
  .field .k { font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--faint); font-weight:600; margin-bottom:2px; }
  .field.signal { border-left:2px solid var(--hair); padding-left:11px; }
  .field .v { font-size:13.5px; color:var(--ink); }
  .field.sowhat .v, .field.signal .v { color:var(--muted); }

  .meta { display:flex; flex-wrap:wrap; gap:6px 18px; margin-top:12px; padding-top:11px; border-top:1px dashed var(--hair);
    font-size:12px; color:var(--muted); }
  .meta b { color:var(--ink); font-weight:600; }
  .meta .k { color:var(--faint); }

  details.src { margin-top:10px; }
  details.src > summary { cursor:pointer; font-size:12px; color:var(--muted); list-style:none;
    display:inline-flex; align-items:center; gap:6px; padding:3px 0; }
  details.src > summary::-webkit-details-marker { display:none; }
  details.src > summary .tw { font-variant-numeric:tabular-nums; }
  details.src[open] > summary { color:var(--ink); }
  .srclist { list-style:none; margin:6px 0 0; padding:0; display:flex; flex-direction:column; gap:5px; }
  .srclist li { font-size:12.5px; display:flex; gap:8px; align-items:baseline; }
  .srclist .fdot { width:8px; height:8px; border-radius:50%; flex:none; transform:translateY(1px); }
  .fdot.f-verified { background:var(--f-verified); } .fdot.f-paywall { background:var(--f-paywall); } .fdot.f-unverified { background:var(--f-unverified); }
  .srclist a { text-decoration:none; color:var(--ink); border-bottom:1px solid var(--hair); }
  .srclist a:hover { border-color:var(--accent); color:var(--accent); }
  .srclist .so { color:var(--muted); } .srclist .sd { color:var(--faint); font-family:ui-monospace,Menlo,monospace; font-size:11.5px; }
  .srclist .note { color:var(--f-paywall); font-size:11.5px; font-style:italic; }

  /* Feed */
  .feed-wrap { margin-top:14px; background:var(--surface); border:1px solid var(--hair);
    border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
  .tbl-scroll { overflow-x:auto; }
  table.feed { border-collapse:collapse; width:100%; font-size:13px; min-width:640px; }
  table.feed th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em;
    color:var(--faint); font-weight:600; padding:10px 14px; border-bottom:1px solid var(--hair); background:var(--surface-2); position:sticky; top:0; }
  table.feed td { padding:10px 14px; border-bottom:1px solid var(--hair); vertical-align:top; }
  table.feed tr:last-child td { border-bottom:none; }
  table.feed tr:hover td { background:var(--surface-2); }
  td.d { font-family:ui-monospace,Menlo,monospace; font-size:12px; color:var(--muted); white-space:nowrap; }
  td.t a { text-decoration:none; color:var(--ink); }
  td.t a:hover { color:var(--accent); }
  td.t .sum { color:var(--muted); font-size:12px; margin-top:2px; display:block; }
  td.o { color:var(--muted); white-space:nowrap; }
  td.techc { white-space:nowrap; }
  .serref { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--accent); text-decoration:none;
    border:1px solid color-mix(in srgb,var(--accent) 30%,transparent); border-radius:5px; padding:1px 5px; }
  .serref.none { color:var(--faint); border-color:var(--hair); }
  .minitag { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:3px; vertical-align:-1px; }
  .mt-ai{background:var(--tech-ai);} .mt-data{background:var(--tech-data);} .mt-robo{background:var(--tech-robo);} .mt-dews{background:var(--tech-dews);}

  .subhead { display:flex; align-items:center; gap:12px; margin:34px 4px 4px; }
  .subhead h2 { font-size:15px; margin:0; font-weight:620; }
  .subhead .rule { flex:1; height:1px; background:var(--hair); }
  .empty { padding:30px; text-align:center; color:var(--faint); font-size:13.5px; }
  footer { margin-top:40px; padding-top:16px; border-top:1px solid var(--hair); color:var(--faint); font-size:12px;
    display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  footer .legend { display:flex; gap:12px; flex-wrap:wrap; }
  footer .lg { display:inline-flex; align-items:center; gap:5px; }
  footer .lg .fdot { width:8px; height:8px; border-radius:50%; }

  @media (max-width:760px) {
    .tiles { grid-template-columns:repeat(2,1fr); }
    .brand h1 { font-size:15px; }
    .search { margin-left:0; max-width:none; }
  }
  /* CSIO brief pane */
  .brief { display:grid; grid-template-columns:1.5fr 1fr; gap:12px; margin:22px 0 8px; }
  .brief-col { background:var(--surface); border:1px solid var(--hair); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px; min-width:0; }
  .brief-h { display:flex; align-items:baseline; gap:10px; margin-bottom:11px; flex-wrap:wrap; }
  .brief-h h2 { font-size:14px; margin:0; font-weight:650; letter-spacing:-.005em; }
  .brief-eyebrow { font-size:10px; text-transform:uppercase; letter-spacing:.11em; color:var(--accent-ink); background:var(--accent); padding:2px 7px; border-radius:5px; font-weight:700; }
  .brief-sub { font-size:11.5px; color:var(--faint); }
  .lead { display:block; width:100%; background:var(--surface-2); border:1px solid var(--hair); border-left:4px solid var(--vc,var(--accent)); border-radius:8px; padding:12px 13px; margin-bottom:8px; }
  .lead:hover { border-color:var(--faint); border-left-color:var(--vc,var(--accent)); }
  .lead.v-gap{--vc:var(--v-gap);} .lead.v-emerging{--vc:var(--v-emerging);} .lead.v-proven{--vc:var(--v-proven);}
  .lead-hit { all:unset; display:block; width:100%; box-sizing:border-box; text-align:left; cursor:pointer; font:inherit; color:inherit; }
  .lead-top { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
  .lead-decision { font-size:15px; line-height:1.35; font-weight:600; letter-spacing:-.01em; text-wrap:pretty; }
  .lead-signal { font-size:12.5px; color:var(--muted); margin-top:5px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .lead-meta { font-size:11.5px; color:var(--muted); margin-top:8px; }
  .lead-meta .k { color:var(--faint); }
  .lead-video { margin-top:11px; }
  .lead-video .frame { position:relative; width:100%; padding-top:56.25%; border-radius:8px; overflow:hidden; background:#000; border:1px solid var(--hair); }
  .lead-video .frame iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .lead-video .vcap { margin-top:6px; font-size:11px; color:var(--faint); line-height:1.4; }
  .brief-list { list-style:none; margin:0; padding:0; }
  .hl { display:flex; align-items:center; gap:9px; width:100%; text-align:left; cursor:pointer; background:transparent; border:0; border-top:1px solid var(--hair); padding:9px 2px; font:inherit; color:inherit; }
  .hl:hover .hl-title { color:var(--accent); }
  .hl-dot { width:8px; height:8px; border-radius:50%; background:var(--vc,var(--faint)); flex:none; }
  .hl.v-gap{--vc:var(--v-gap);} .hl.v-emerging{--vc:var(--v-emerging);} .hl.v-proven{--vc:var(--v-proven);}
  .id.sm { font-size:11px; padding:1px 5px; }
  .hl-title { flex:1; min-width:0; font-size:13px; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .newpill { font-size:9.5px; font-weight:700; letter-spacing:.05em; color:#fff; background:var(--v-gap); padding:1px 5px; border-radius:4px; flex:none; }
  .newpill.sm { font-size:9px; }
  .chip.sm { font-size:10px; padding:1px 6px; flex:none; }
  .brief-feed { list-style:none; margin:0; padding:0; }
  .fi { display:block; text-decoration:none; color:inherit; border-top:1px solid var(--hair); padding:9px 2px; }
  .brief-feed li:first-child .fi { border-top:0; }
  .fi:hover .fi-title { color:var(--accent); }
  .fi-date { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--faint); display:inline-flex; align-items:center; gap:5px; }
  .fi-title { display:block; font-size:12.5px; line-height:1.35; margin:2px 0; color:var(--ink); }
  .fi-out { font-size:11px; color:var(--muted); }
  .newdot { width:6px; height:6px; border-radius:50%; background:var(--v-gap); display:inline-block; }
  .flash { animation:flashbg 1.3s ease; }
  @keyframes flashbg { 0%,100%{ background:var(--surface); } 14%{ background:color-mix(in srgb, var(--accent) 16%, var(--surface)); } }
  @media (max-width:860px){ .brief { grid-template-columns:1fr; } }
  @media (prefers-reduced-motion:reduce){ .flash { animation:none; } }

  @media (prefers-reduced-motion:no-preference) {
    .card, .tile { transition:opacity .2s ease; }
  }
</style>
</head>
<body>
<header class="mast">
  <div class="mast-in">
    <div class="brand">
      <span class="mark">SIO</span>
      <h1>SIO Insights</h1>
      <span class="ed" id="ed"></span>
    </div>
    <nav class="tabs">
      <a href="./index.html" class="active" aria-current="page">Dashboard</a>
      <a href="./explainer.html">How it works</a>
    </nav>
    <span class="mast-spacer"></span>
    <button class="themebtn" id="theme" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
  </div>
</header>

<main class="wrap">
  <section class="tiles" id="tiles"></section>

  <section class="brief" id="brief" aria-label="CSIO brief">
    <div class="brief-col">
      <div class="brief-h"><span class="brief-eyebrow">For the CSIO</span><h2>Priority brief</h2><span class="brief-sub">decisions &amp; new signals, ranked</span></div>
      <div id="brief-lead"></div>
      <ul class="brief-list" id="brief-list"></ul>
    </div>
    <div class="brief-col">
      <div class="brief-h"><h2>Latest intake</h2><span class="brief-sub">newest source items</span></div>
      <ul class="brief-feed" id="brief-feed"></ul>
    </div>
  </section>

  <section class="controls" aria-label="Filters">
    <div class="fgroup" id="f-tech"><span class="glabel">Tech</span></div>
    <div class="fgroup" id="f-desk"><span class="glabel">Desk</span></div>
    <div class="fgroup" id="f-verdict"><span class="glabel">Verdict</span></div>
    <input class="search" id="q" type="search" placeholder="Search signals, decisions…" aria-label="Search">
  </section>

  <div id="serials"></div>

  <div class="subhead"><h2>Source feed</h2><span class="rule"></span></div>
  <div class="feed-wrap">
    <div class="tbl-scroll">
      <table class="feed">
        <thead><tr><th>Date</th><th>Story</th><th>Outlet</th><th>Tech</th><th>Desk</th><th>Serial</th></tr></thead>
        <tbody id="feedbody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <span id="asof"></span>
    <span class="legend">
      <span class="lg"><span class="fdot" style="background:var(--f-verified)"></span>verified</span>
      <span class="lg"><span class="fdot" style="background:var(--f-paywall)"></span>paywall</span>
      <span class="lg"><span class="fdot" style="background:var(--f-unverified)"></span>unverified</span>
    </span>
  </footer>
</main>

<!-- Load data.js with a per-load cache-buster so a refresh always fetches the
     latest edition. GitHub Pages ignores netlify.toml headers and caches assets,
     so without this a browser can keep serving a stale data.js after a refresh.
     document.write injects the script synchronously during parse, so the init
     script below still sees window.SIO_DATA. -->
<script>document.write('<scr' + 'ipt src="./data.js?v=' + Date.now() + '"></scr' + 'ipt>');</script>
<script>
(function () {
  var D = window.SIO_DATA;
  if (!D) { document.getElementById('serials').innerHTML =
    '<div class="empty">data.js not found — serve this page from the repo root so <code>./data.js</code> loads.</div>'; return; }

  var TECH = { ai:'AI', data:'Data', robo:'Robotics', dews:'DE/EMS' };
  var PF = {
    P1:'Full-Spectrum Non-Kinetic Capabilities',
    P2:'Grey-Zone Capabilities',
    P3:'Integrated Soldier Combat System',
    P4:'Intelligent Future Mounted Manoeuvre',
    P5:'All-Echelon Sensing and Strike',
    P6:'Intelligent Cloud-Based Command and Control',
    P7:'Multidimensional Force Sustenance',
    P8:'Multidimensional Force Projection',
    P9:'Immersive Training Environment',
    X:'Cross-cutting / overarching'
  };
  var OWNER = {
    SIO:  { code:'SIO', label:'Office-level coordination & net-assessment' },
    ASB1: { code:'A1',  label:'Manoeuvre concepts' },
    ASB2: { code:'A2',  label:'Sense-strike — precision fires, counter-UAS, directed energy' },
    ASB3: { code:'A3',  label:'PSO, HADR, CT, CUAS, GZ — peace support, humanitarian assistance/disaster relief, counter-terrorism, counter-UAS, grey-zone' },
    CESS: { code:'CS',  label:'Sustainment planning' },
    AOTO: { code:'OTO', label:'Acquisition / test-to-operations transition' },
    ADO:  { code:'D4',  label:'Army Data Office — data integration & cloud, AI, digitalisation front-end planning' }
  };
  function ownerTag(o) {
    var m = OWNER[o];
    if (!m) return esc(o);
    return '<span title="'+esc(o)+' — '+esc(m.label)+'">'+esc(m.code)+'</span>';
  }
  var DESKS = ['US','EU','APAC','ME'];
  var VERDICTS = ['gap','emerging','proven'];
  var SECTIONS = {
    'I':  'Strategic & concept-shaping signals',
    'II': 'Capability contests & gaps',
    'III':'Proven & fielding developments'
  };
  var esc = function (s) { return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };

  var state = { tech:new Set(), desk:new Set(), verdict:new Set(), q:'' };

  /* Theme */
  var root = document.documentElement, tbtn = document.getElementById('theme');
  tbtn.addEventListener('click', function () {
    var cur = root.getAttribute('data-theme');
    if (!cur) cur = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.setAttribute('data-theme', cur === 'dark' ? 'light' : 'dark');
  });

  /* Header */
  document.getElementById('ed').textContent = '— ' + D.edition + ' edition';
  document.getElementById('asof').textContent = 'Feed as of ' + D.feedAsOf + ' · ' +
    D.serials.length + ' serials · ' + D.feed.length + ' items';

  /* Tiles */
  var nGap = D.serials.filter(function(s){return s.verdict==='gap';}).length;
  var nDec = D.serials.filter(function(s){return s.priority==='decision';}).length;
  var nProv = D.serials.filter(function(s){return s.verdict==='proven';}).length;
  document.getElementById('tiles').innerHTML =
    tile('', D.serials.length, 'Serials') +
    tile('dec', nDec, 'Decisions sought') +
    tile('gap', nGap, 'Capability gaps') +
    tile('prov', nProv, 'Proven / fielding') +
    tile('feed', D.feed.length, 'Feed items');
  function tile(c,n,l){ return '<div class="tile '+c+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }

  /* Filter chips */
  function buildToggles(host, items, kind, colorVar) {
    Object.keys(items).forEach(function (k) {
      var b = document.createElement('button');
      b.className = 'toggle'; b.type='button'; b.setAttribute('aria-pressed','false');
      b.dataset.kind = kind; b.dataset.val = k;
      if (colorVar) b.style.setProperty('--c', colorVar(k));
      b.innerHTML = (colorVar ? '<span class="dot"></span>' : '') + items[k];
      b.addEventListener('click', function () {
        var on = b.getAttribute('aria-pressed') === 'true';
        b.setAttribute('aria-pressed', on ? 'false' : 'true');
        state[kind][on ? 'delete' : 'add'](k); render();
      });
      host.appendChild(b);
    });
  }
  buildToggles(document.getElementById('f-tech'), TECH, 'tech',
    function(k){ return getComputedStyle(root).getPropertyValue('--tech-'+k); });
  var deskObj = {}; DESKS.forEach(function(d){ deskObj[d]=d; });
  buildToggles(document.getElementById('f-desk'), deskObj, 'desk', null);
  var vObj = {}; VERDICTS.forEach(function(v){ vObj[v]=v.charAt(0).toUpperCase()+v.slice(1); });
  buildToggles(document.getElementById('f-verdict'), vObj, 'verdict',
    function(k){ return getComputedStyle(root).getPropertyValue('--v-'+k); });
  document.getElementById('q').addEventListener('input', function (e) {
    state.q = e.target.value.trim().toLowerCase(); render();
  });

  function serialDesks(s){ return [s.desk, s.desk2].filter(Boolean); }
  function matchSerial(s) {
    if (state.tech.size && !s.tech.some(function(t){return state.tech.has(t);})) return false;
    if (state.desk.size && !serialDesks(s).some(function(d){return state.desk.has(d);})) return false;
    if (state.verdict.size && !state.verdict.has(s.verdict)) return false;
    if (state.q) {
      var hay = (s.decision+' '+s.signal+' '+s.sowhat+' '+s.action+' '+(s.dlabel||'')+' '+s.id+' '+s.owner).toLowerCase();
      if (hay.indexOf(state.q) < 0) return false;
    }
    return true;
  }
  function matchFeed(f) {
    if (state.tech.size && !(f.tech||[]).some(function(t){return state.tech.has(t);})) return false;
    if (state.desk.size && !state.desk.has(f.desk)) return false;
    if (state.verdict.size) { // feed has no verdict; match via linked serial
      var s = f.serial && D.serials.find(function(x){return x.id===f.serial;});
      if (!s || !state.verdict.has(s.verdict)) return false;
    }
    if (state.q) {
      var hay = (f.ttl+' '+f.sum+' '+f.out).toLowerCase();
      if (hay.indexOf(state.q) < 0) return false;
    }
    return true;
  }

  function techChips(arr, cls) {
    return arr.map(function(t){
      return '<span class="'+(cls||'chip tech')+' t-'+t+'"><span class="dot"></span>'+(TECH[t]||t)+'</span>';
    }).join('');
  }

  /* ---- CSIO brief: rank "new & relevant" to the top ---- */
  var MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var asOf = new Date(D.feedAsOf + 'T00:00:00');
  function fmtDate(iso){ var p = iso.split('-'); return (+p[2]) + ' ' + MON[(+p[1]) - 1]; }
  function serialIsNew(s){ return s.age <= 1; }
  function feedIsNew(f){ return (asOf - new Date(f.date + 'T00:00:00')) / 86400000 <= 5; }
  function relevance(s){
    var v = s.verdict === 'gap' ? 2 : s.verdict === 'proven' ? 1 : 0;   // gaps most urgent
    var p = s.priority === 'decision' ? 3 : 0;                          // needs a call
    var n = s.age <= 1 ? 2 : s.age === 2 ? 1 : 0;                       // newness
    return p + v + n;
  }
  function miniTags(arr){ return (arr||[]).map(function(t){ return '<span class="minitag mt-'+t+'" title="'+(TECH[t]||t)+'"></span>'; }).join(''); }

  function ytId(url) {
    var m = /(?:youtu\.be\/|youtube(?:-nocookie)?\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{6,})/.exec(url || '');
    return m ? m[1] : null;
  }
  function videoEmbed(media) {
    var yt = (media || []).find(function(m){ return m.platform === 'youtube'; });
    if (!yt) return '';
    var id = ytId(yt.url);
    if (!id) return '';
    return '<div class="lead-video"><div class="frame"><iframe src="https://www.youtube-nocookie.com/embed/'+id+'" '
      + 'title="'+esc(yt.ttl)+'" loading="lazy" allow="accelerometer; encrypted-media; gyroscope; picture-in-picture" '
      + 'referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>'
      + '<div class="vcap">▸ '+esc(yt.ttl)+'</div></div>';
  }
  function leadCard(s){
    return '<div class="lead v-'+s.verdict+'">'
      + '<button type="button" class="lead-hit" data-goto="'+esc(s.id)+'">'
      +   '<div class="lead-top"><span class="id">'+esc(s.id)+'</span>'
      +     '<span class="chip verdict">'+esc(s.verdict)+'</span>'
      +     '<span class="chip prio-'+s.priority+'">'+s.priority.toUpperCase()+'</span>'
      +     (serialIsNew(s) ? '<span class="newpill">NEW</span>' : '')
      +     '<span class="grow"></span>'
      +     serialDesks(s).map(function(d){return '<span class="chip desk">'+esc(d)+'</span>';}).join('')
      +   '</div>'
      +   (s.dlabel ? '<div class="dlabel">'+esc(s.dlabel)+'</div>' : '')
      +   '<div class="lead-decision">'+esc(s.decision)+'</div>'
      +   '<div class="lead-signal">'+esc(s.signal)+'</div>'
      +   '<div class="lead-meta"><span class="k">Suspense</span> <b>'+esc(s.suspense)+'</b> · <span class="k">Owner</span> '+ownerTag(s.owner)+'</div>'
      + '</button>'
      + videoEmbed(s.media)
      + '</div>';
  }
  function hlRow(s){
    return '<li><button type="button" class="hl v-'+s.verdict+'" data-goto="'+esc(s.id)+'">'
      + '<span class="hl-dot"></span><span class="id sm">'+esc(s.id)+'</span>'
      + '<span class="hl-title">'+esc(s.decision)+'</span>'
      + (serialIsNew(s) ? '<span class="newpill sm">NEW</span>' : '')
      + '<span class="chip prio-'+s.priority+' sm">'+s.priority.toUpperCase()+'</span>'
      + '</button></li>';
  }
  function fiRow(f){
    return '<li><a class="fi" href="'+esc(f.url)+'" target="_blank" rel="noopener">'
      + '<span class="fi-date">'+fmtDate(f.date)+(feedIsNew(f) ? ' <span class="newdot" title="new"></span>' : '')+'</span>'
      + '<span class="fi-title">'+esc(f.ttl)+'</span>'
      + '<span class="fi-out">'+esc(f.out)+' · '+miniTags(f.tech)+' '+esc(f.desk)+'</span>'
      + '</a></li>';
  }
  function renderBrief(serials, feed){
    var ranked = serials.slice().sort(function(a,b){
      var d = relevance(b) - relevance(a); if (d) return d;
      if (a.age !== b.age) return a.age - b.age;
      return a.id.localeCompare(b.id);
    });
    document.getElementById('brief-lead').innerHTML = ranked.length ? leadCard(ranked[0]) : '<div class="empty" style="padding:14px">No items.</div>';
    document.getElementById('brief-list').innerHTML = ranked.slice(1, 5).map(hlRow).join('');
    document.getElementById('brief-feed').innerHTML = feed.length ? feed.slice(0, 6).map(fiRow).join('') : '<li class="empty" style="padding:14px">No items.</li>';
  }
  document.getElementById('brief').addEventListener('click', function(e){
    var el = e.target.closest('[data-goto]'); if (!el) return;
    var t = document.getElementById('serial-' + el.getAttribute('data-goto'));
    if (t){ t.scrollIntoView({ behavior:'smooth', block:'center' }); t.classList.remove('flash'); void t.offsetWidth; t.classList.add('flash'); }
  });

  function serialCard(s) {
    var top = '<div class="card-top">'
      + '<span class="id">'+esc(s.id)+'</span>'
      + '<span class="chip verdict">'+esc(s.verdict)+'</span>'
      + '<span class="chip prio-'+s.priority+'">'+s.priority.toUpperCase()+'</span>'
      + (s.status==='actioned' ? '<span class="chip status">actioned</span>' : '')
      + '<span class="grow"></span>'
      + '<span class="pf" title="'+esc(PF[s.pf]||s.pf)+'">'+esc(s.pf)+'</span>'
      + serialDesks(s).map(function(d){return '<span class="chip desk">'+esc(d)+'</span>';}).join('')
      + techChips(s.tech)
      + '</div>';
    var body = '<div class="card-body">'
      + (s.dlabel ? '<div class="dlabel">'+esc(s.dlabel)+'</div>' : '')
      + '<div class="decision">'+esc(s.decision)+'</div>'
      + '<div class="analysis">'
      +   '<div class="field signal"><div class="k">Signal</div><div class="v">'+esc(s.signal)+'</div></div>'
      +   '<div class="field sowhat"><div class="k">So what</div><div class="v">'+esc(s.sowhat)+'</div></div>'
      +   '<div class="field action"><div class="k">Action</div><div class="v">'+esc(s.action)+'</div></div>'
      + '</div>'
      + '<div class="meta">'
      +   '<span><span class="k">Owner</span> <b>'+ownerTag(s.owner)+(s.owner2?' + '+ownerTag(s.owner2):'')+'</b></span>'
      +   '<span><span class="k">AO</span> '+esc(s.ao)+'</span>'
      +   '<span><span class="k">Suspense</span> <b>'+esc(s.suspense)+'</b></span>'
      +   '<span><span class="k">Raised</span> '+esc(s.raised)+' <span class="k">· age</span> '+s.age+'</span>'
      + '</div>'
      + srcBlock(s.src)
      + mediaBlock(s.media)
      + '</div>';
    return '<article id="serial-'+esc(s.id)+'" class="card v-'+s.verdict+'">'+top+body+'</article>';
  }
  function mediaBlock(media) {
    if (!media || !media.length) return '';
    var items = media.map(function(m){
      return '<li><span class="chip media">'+esc(m.platform)+'</span>'
        + '<span><a href="'+esc(m.url)+'" target="_blank" rel="noopener">'+esc(m.ttl)+'</a> '
        + '<span class="sd">'+esc(m.date)+'</span>'
        + (m.note ? '<br><span class="note">'+esc(m.note)+'</span>' : '')
        + '</span></li>';
    }).join('');
    return '<details class="src"><summary>▸ <span class="tw">'+media.length+'</span> video'+(media.length>1?'s':'')+'</summary>'
      + '<ul class="srclist">'+items+'</ul></details>';
  }
  function srcBlock(src) {
    if (!src || !src.length) return '';
    var items = src.map(function(x){
      return '<li><span class="fdot f-'+x.f+'"></span>'
        + '<span><a href="'+esc(x.url)+'" target="_blank" rel="noopener">'+esc(x.ttl)+'</a> '
        + '<span class="so">'+esc(x.out)+'</span> <span class="sd">'+esc(x.date)+'</span>'
        + (x.note ? '<br><span class="note">'+esc(x.note)+'</span>' : '')
        + '</span></li>';
    }).join('');
    return '<details class="src"><summary>▸ <span class="tw">'+src.length+'</span> source'+(src.length>1?'s':'')+'</summary>'
      + '<ul class="srclist">'+items+'</ul></details>';
  }

  function render() {
    var host = document.getElementById('serials'); host.innerHTML = '';
    var shown = D.serials.filter(matchSerial);
    var order = Object.keys(SECTIONS);
    var any = false;
    order.forEach(function (sec) {
      var group = shown.filter(function(s){ return s.id.split('-')[0] === sec; })
        .sort(function(a,b){ return (+a.id.split('-')[1]) - (+b.id.split('-')[1]); });
      if (!group.length) return;
      any = true;
      var h = '<div class="sec-h"><span class="rn">'+sec+'</span><h2>'+SECTIONS[sec]+'</h2>'
        + '<span class="rule"></span><span class="ct">'+group.length+'</span></div>';
      host.insertAdjacentHTML('beforeend', h + '<div class="cards">' + group.map(serialCard).join('') + '</div>');
    });
    if (!any) host.innerHTML = '<div class="empty">No serials match the current filters.</div>';

    var fb = document.getElementById('feedbody');
    var feed = D.feed.filter(matchFeed);
    fb.innerHTML = feed.length ? feed.map(function (f) {
      var mtags = (f.tech||[]).map(function(t){return '<span class="minitag mt-'+t+'" title="'+(TECH[t]||t)+'"></span>';}).join('');
      var ser = f.serial ? '<a class="serref" href="#" title="linked serial">'+esc(f.serial)+'</a>'
                         : '<span class="serref none">—</span>';
      return '<tr>'
        + '<td class="d">'+esc(f.date)+'</td>'
        + '<td class="t"><a href="'+esc(f.url)+'" target="_blank" rel="noopener">'+esc(f.ttl)+'</a>'
        +   '<span class="sum">'+esc(f.sum)+'</span></td>'
        + '<td class="o">'+esc(f.out)+' <span class="fdot f-'+f.f+'" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--f-'+f.f+')"></span></td>'
        + '<td class="techc">'+mtags+'</td>'
        + '<td class="o">'+esc(f.desk)+'</td>'
        + '<td>'+ser+'</td>'
        + '</tr>';
    }).join('') : '<tr><td colspan="6" class="empty">No feed items match the current filters.</td></tr>';

    renderBrief(shown, feed);
  }

  render();
})();
</script>
</body>
</html>
