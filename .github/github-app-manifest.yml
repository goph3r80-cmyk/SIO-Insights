# SIO Insights — GitHub App manifest
#
# Source of truth for the "SIO Insights" GitHub App. This file is registered
# with GitHub via the App Manifest flow, which mints the App ID, client
# secret, private key, and webhook secret for you (nothing secret lives here).
#
# To register: open docs/github-app/register.html in a browser (or follow
# docs/GITHUB-APP.md) and submit. GitHub redirects back with the credentials.
#
# Keep permissions least-privilege: this App exists to refresh data.js and
# open pull requests for the weekly SIO Insights pipeline — nothing more.

# Public-facing name shown on the App's page and on commits it authors.
name: SIO Insights Bot

# Homepage for the App (the repository itself).
url: https://github.com/goph3r80-cmyk/sio-insights

# Webhook delivery. Replace `url` with your receiver before registering, or
# leave `active: false` to register the App now and wire the webhook later.
# The webhook secret is generated by GitHub during the manifest flow — store
# the returned value as WEBHOOK_SECRET (see .env.example) and verify every
# delivery with scripts/webhook-verify.js.
hook_attributes:
  url: https://example.com/sio-insights/webhook
  active: false

# Where GitHub sends the temporary code at the end of the manifest flow.
# The register.html page reads this to exchange the code for credentials.
redirect_url: https://example.com/sio-insights/registered

# Private App — installable only on repositories you own.
public: false

# Only request write on the App's own installation, no org-wide grants.
setup_on_update: false
request_oauth_on_install: false

# Least-privilege permission set for the pipeline:
#   contents      write  — commit the refreshed data.js
#   pull_requests write  — open the weekly refresh PR instead of pushing to main
#   metadata      read   — mandatory baseline, always granted
#   actions       write  — (optional) trigger the deploy workflow via API
default_permissions:
  contents: write
  pull_requests: write
  metadata: read
  actions: write

# Events the App subscribes to. `push` and `pull_request` cover the refresh
# lifecycle; drop what your receiver does not handle.
default_events:
  - push
  - pull_request
